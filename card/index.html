<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>QD SYSTEMS Card</title>
  <meta name="theme-color" content="#030303">
  <link rel="icon" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/card/card.css">
</head>
<body>
  <div class="qd-card-page">
    <div class="qd-card-grid"></div>

    <header class="qd-card-topbar">
      <div class="qd-card-wordmark">QD SYSTEMS</div>
      <a class="qd-card-domain" href="https://qdsystems.ae" target="_blank" rel="noreferrer noopener">qdsystems.ae</a>
    </header>

    <main class="qd-card-shell">
      <section class="qd-card-panel is-visible" id="card-panel" aria-live="polite">
        <div class="qd-card-skeleton" id="card-skeleton">
          <div class="qd-card-skeleton-avatar qd-skeleton-block"></div>
          <div class="qd-card-skeleton-line qd-skeleton-block qd-card-skeleton-name"></div>
          <div class="qd-card-skeleton-line qd-skeleton-block qd-card-skeleton-role"></div>
          <div class="qd-card-skeleton-pill qd-skeleton-block"></div>
          <div class="qd-card-skeleton-actions">
            <div class="qd-skeleton-block qd-card-skeleton-button"></div>
            <div class="qd-skeleton-block qd-card-skeleton-button"></div>
          </div>
          <div class="qd-card-skeleton-list">
            <div class="qd-skeleton-block qd-card-skeleton-link"></div>
            <div class="qd-skeleton-block qd-card-skeleton-link"></div>
            <div class="qd-skeleton-block qd-card-skeleton-link"></div>
          </div>
        </div>

        <div class="qd-card-content" id="card-content" hidden></div>
        <div class="qd-card-empty" id="card-empty" hidden></div>
      </section>
    </main>
  </div>

  <script type="module" src="/card/card.js"></script>
</body>
</html>
